# Version bump type: patch, minor, major, hotfix, or prerelease
bump = "minor"
# Short description of this release (required)
description = "Embedded async server for background mode with graceful shutdown"
# Optional context explaining why these changes were made
context = "The old foreground=False path ran Granian.serve() in a daemon thread, which had fork-in-thread, sys.exit-in-thread, and no-stop-mechanism bugs. The new implementation uses granian.server.embed.Server, running async workers without forking or signal registration."
